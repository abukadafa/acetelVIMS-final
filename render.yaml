services:
  # Backend API (Node.js)
  - type: web
    name: acetel-backend
    env: node
    plan: free
    region: oregon
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://acetel-vims.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # Frontend (Static Site)
  - type: web
    name: acetel-frontend
    env: static
    plan: free
    region: oregon
    buildCommand: cd client && npm install && npm run build
    publishDir: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://acetel-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://acetel-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
