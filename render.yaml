## render.yaml — ACETEL Virtual Internship Management System

services:
  # ── Backend API (Node.js) ──────────────────────────────────────────────────
  - type: web
    name: acetel-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://acetel-frontend.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false
      - key: WA_ACCESS_TOKEN
        sync: false
      - key: WA_WEBHOOK_VERIFY_TOKEN
        sync: false

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: static
    name: acetel-frontend
    plan: free
    region: oregon
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://acetel-backend.onrender.com/api/
      - key: VITE_SOCKET_URL
        value: https://acetel-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
