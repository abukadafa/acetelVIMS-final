## docker-compose.yml — ACETEL VIMS Self-Hosted Deployment
## Usage: copy .env.example to .env, fill in values, then: docker-compose up -d

services:
  nginx:
    image: nginx:alpine
    container_name: acetel-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/html
    depends_on:
      - frontend
      - backend
    networks:
      - frontend_net
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        - VITE_API_URL=${FRONTEND_URL}/api/
        - VITE_SOCKET_URL=${FRONTEND_URL}
        - VITE_ENVIRONMENT=production
    container_name: acetel-frontend
    networks:
      - frontend_net
    restart: unless-stopped

  backend:
    build: ./server
    container_name: acetel-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://${DB_USER}:${DB_PASS}@acetel-mongodb:27017/${DB_NAME}?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM}
    depends_on:
      acetel-mongodb:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    volumes:
      - acetel-uploads:/app/uploads

  acetel-mongodb:
    image: mongo:7
    container_name: acetel-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASS}
      - MONGO_INITDB_DATABASE=${DB_NAME}
    volumes:
      - acetel-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend_net
    restart: unless-stopped

  acetel-backups:
    image: mongo:7
    container_name: acetel-backups
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./infra/backups:/scripts
      - acetel-mongo-backups:/backup/archive
    entrypoint: ["/bin/sh", "-c", "chmod +x /scripts/backup_task.sh && while true; do /scripts/backup_task.sh; sleep 86400; done"]
    depends_on:
      acetel-mongodb:
        condition: service_healthy
    networks:
      - backend_net
    restart: unless-stopped

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  acetel-mongo-data:
  acetel-mongo-backups:
  acetel-uploads:
  certbot-etc:
  certbot-var:
  webroot:
